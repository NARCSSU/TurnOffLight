<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Mode Switch</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <div class="header">
      <h1 data-i18n="extensionName">Dark Mode Switch</h1>
      <p class="subtitle" data-i18n="subtitle">Toggle dark mode for better viewing</p>
    </div>

    <div class="toggle-section">
      <label class="toggle-label">
        <span class="toggle-text" data-i18n="enableExtension">Enable Extension</span>
        <button id="plugin-toggle" class="toggle-btn">OFF</button>
      </label>
    </div>

  </div>

  <script src="popup.js"></script>
</body>

</html>
